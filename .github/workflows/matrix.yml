name: Differential matrix

# Generate the cross-language parser divergence matrix and publish it. Every
# third-party parser runs in its own `docker run --network=none` container — it parses
# adversarial input with untrusted dependencies, so it gets NO network egress
# (defence-in-depth against a compromised dependency). This `matrix` job also holds NO
# push/deploy credentials (permissions: contents: read); only the separate
# `deploy-pages` job — which runs no untrusted code — can publish. Runs on demand and
# on main, in its own workflow, separate from the gating CI, since it is informational.
on:
  workflow_dispatch:
    inputs:
      node_version:
        description: "node image version (Docker path only; default 24)"
        required: false
        type: string
      go_version:
        description: "golang image version (Docker path only; default 1.26)"
        required: false
        type: string
      php_version:
        description: "php image X.Y version, -cli flavor fixed (default 8.5)"
        required: false
        type: string
      openresty_version:
        description: "openresty image version, -bookworm flavor fixed (default 1.31.1.1-0)"
        required: false
        type: string
      java_version:
        description: "eclipse-temurin JDK version, -jre flavor fixed (default 25)"
        required: false
        type: string
      python_version:
        description: "python image version (default 3.13, current stable)"
        required: false
        type: string
      dotnet_version:
        description: "dotnet SDK image version (default 8.0)"
        required: false
        type: string
  pull_request:
    paths:
      - "crates/**"
      - ".github/workflows/matrix.yml"
  push:
    branches: [main]
    paths:
      - "crates/**"
      - ".github/workflows/matrix.yml"

permissions:
  contents: read

jobs:
  matrix:
    name: cross-language parser matrix
    runs-on: ubuntu-latest
    # Optional per-sidecar version overrides (set via workflow_dispatch; empty on
    # pull_request/push → the defaults below and in sidecar.rs apply). Keep these
    # in sync with ImageSpec::default_version in src/differential/sidecar.rs.
    env:
      NODE_VERSION: ${{ inputs.node_version }}
      GO_VERSION: ${{ inputs.go_version }}
      PHP_VERSION: ${{ inputs.php_version }}
      OPENRESTY_VERSION: ${{ inputs.openresty_version }}
      JAVA_VERSION: ${{ inputs.java_version }}
      PYTHON_VERSION: ${{ inputs.python_version }}
      DOTNET_VERSION: ${{ inputs.dotnet_version }}
      # Resilient crates.io downloads: more retries + HTTP/1.1, sidestepping the
      # intermittent curl "[16] HTTP2 framing layer" error while `cargo` updates the
      # index / downloads deps in the "Generate the matrix" step.
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
    steps:
      - uses: actions/checkout@v7

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustc --version

      # Resolve every sidecar's image tag once (honouring the optional *_VERSION
      # overrides), so the pulls, the dependency-prep steps, and the harness (which
      # resolves the same env in Rust) all agree on one tag. Defaults here MUST match
      # ImageSpec::default_version in src/differential/sidecar.rs.
      - name: Resolve sidecar image tags
        run: |
          echo "NODE_IMAGE=node:${NODE_VERSION:-24}" >> "$GITHUB_ENV"
          echo "GO_IMAGE=golang:${GO_VERSION:-1.26}" >> "$GITHUB_ENV"
          echo "PHP_IMAGE=php:${PHP_VERSION:-8.5}-cli" >> "$GITHUB_ENV"
          echo "OPENRESTY_IMAGE=openresty/openresty:${OPENRESTY_VERSION:-1.31.1.1-0}-bookworm" >> "$GITHUB_ENV"
          # Java: the harness runs the shaded jar from a lean JRE image (JAVA_IMAGE,
          # matching ImageSpec); a matching maven image (same JDK) only builds the jar.
          echo "JAVA_IMAGE=eclipse-temurin:${JAVA_VERSION:-25}-jre" >> "$GITHUB_ENV"
          echo "MAVEN_IMAGE=maven:3.9-eclipse-temurin-${JAVA_VERSION:-25}" >> "$GITHUB_ENV"
          echo "PYTHON_IMAGE=python:${PYTHON_VERSION:-3.13}" >> "$GITHUB_ENV"
          echo "DOTNET_IMAGE=mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION:-8.0}" >> "$GITHUB_ENV"
          echo "BUILDPACK_DEPS_IMAGE=buildpack-deps:${BUILDPACK_DEPS_VERSION:-trixie}" >> "$GITHUB_ENV"
          echo "CLIENTS_IMAGE=keksbruch-clients:local" >> "$GITHUB_ENV"

      # Every sidecar runs containerized: the harness shells out to `docker run
      # --network=none` against these images (Docker is preinstalled on ubuntu-latest),
      # so the runner needs no language toolchains AND an untrusted parser has no network.
      # Pre-pull every official image with network ON — a `--network=none` run cannot
      # pull, so the image must already be local. (Locally, with no Docker, the harness
      # falls back to the host toolchains.) The openresty + curl/wget-client images are
      # *built* below, not pulled; MAVEN_IMAGE builds the Java jar, JAVA_IMAGE runs it.
      - name: Pull the containerized sidecar images
        run: |
          for img in "$PHP_IMAGE" "$GO_IMAGE" "$NODE_IMAGE" "$JAVA_IMAGE" "$MAVEN_IMAGE" \
                     "$PYTHON_IMAGE" "$DOTNET_IMAGE" "$BUILDPACK_DEPS_IMAGE"; do
            docker pull "$img"
          done

      # openresty ships without the `resty` CLI (a recommended package); derive an image
      # that adds it, re-tagged as the ref the harness resolves from ImageSpec.
      - name: Add the resty CLI to the openresty image
        run: |
          docker build -t "$OPENRESTY_IMAGE" - <<DOCKERFILE
          FROM $OPENRESTY_IMAGE
          RUN apt-get update \
              && apt-get install -y --no-install-recommends openresty-resty \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE

      # The curl + wget client sidecar needs both CLIs plus python3 (its driver) in one
      # image, so its loopback server and clients live inside a single --network=none
      # container. No official image carries all three, so build a tiny one.
      - name: Build the curl/wget client image
        run: |
          docker build -t "$CLIENTS_IMAGE" - <<'DOCKERFILE'
          FROM debian:trixie-slim
          RUN apt-get update \
              && apt-get install -y --no-install-recommends curl wget python3 ca-certificates \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE

      # ── Prepare each sidecar's dependencies with network ON, baked into the
      # bind-mounted fixtures (or the image), so the harness can then run every sidecar
      # OFFLINE under --network=none. Each install runs in the SAME image the harness
      # uses, so binaries/wheels match.

      # Node: cookie + tough-cookie + set-cookie-parser + universal-cookie + js-cookie.
      - name: Install Node sidecar deps in the node image
        run: |
          fix="$PWD/crates/keksbruch/fixtures"
          docker run --rm -v "$fix:$fix" -w "$fix" "$NODE_IMAGE" npm ci

      # Python: Werkzeug + mitmproxy into a bind-mounted `.pydeps` (the sidecar prepends
      # it to sys.path); SimpleCookie is stdlib.
      - name: Install Python sidecar deps in the python image
        run: |
          fix="$PWD/crates/keksbruch/fixtures"
          docker run --rm -v "$fix:$fix" -w "$fix" "$PYTHON_IMAGE" \
            pip install --no-cache-dir --target .pydeps -r requirements.txt

      # Java: shade the six-parser jar (Tomcat ×2; jakarta.ws.rs via RESTEasy + Jersey;
      # java.net.HttpCookie + Apache HttpClient5) with maven into the bind-mount.
      - name: Build the Java sidecar jar
        run: |
          fix="$PWD/crates/keksbruch/fixtures"
          docker run --rm -v "$fix:$fix" -w "$fix/java" "$MAVEN_IMAGE" \
            mvn -q -B -DskipTests package

      # .NET: publish a framework-dependent folder (restores Microsoft.Net.Http.Headers
      # now), so the harness runs the published DLL offline with no restore.
      - name: Publish the .NET sidecar
        run: |
          fix="$PWD/crates/keksbruch/fixtures"
          docker run --rm -v "$fix:$fix" -w "$fix/dotnet" "$DOTNET_IMAGE" \
            dotnet publish -c Release -o publish

      # C: compile the libcurl program INSIDE buildpack-deps (gcc + libcurl), so the
      # binary's ABI matches the image the harness runs it in. The compile needs no network.
      - name: Build the C/libcurl sidecar in its image
        run: |
          fix="$PWD/crates/keksbruch/fixtures"
          docker run --rm -v "$fix:$fix" -w "$fix" "$BUILDPACK_DEPS_IMAGE" \
            sh -c 'cc -O2 -Wall parse_cookies.c -o parse_cookies $(pkg-config --cflags --libs libcurl)'

      # Offline smoke-test: run every sidecar's `--selfcheck` with `--network=none` — the
      # exact isolation the harness uses — so a broken offline setup fails here, loudly,
      # rather than as a silent SKIP in the matrix. Each prints availability + versions.
      - name: Smoke-test every sidecar offline (--network=none)
        run: |
          fix="$PWD/crates/keksbruch/fixtures"
          run() { docker run --rm --network=none -v "$fix:$fix" -w "$fix" "$@"; }
          run "$PHP_IMAGE" php "$fix/parse_cookies.php" --selfcheck
          run "$GO_IMAGE" go run "$fix/parse_cookies.go" --selfcheck
          run "$NODE_IMAGE" node "$fix/parse_cookies.js" --selfcheck
          run "$OPENRESTY_IMAGE" resty "$fix/parse_cookies_nginx.lua" --selfcheck
          run "$JAVA_IMAGE" java -jar "$fix/java/target/sidecar.jar" --selfcheck
          run "$PYTHON_IMAGE" python3 "$fix/parse_cookies.py" --selfcheck
          run "$DOTNET_IMAGE" dotnet "$fix/dotnet/publish/parse_cookies.dll" --selfcheck
          run "$BUILDPACK_DEPS_IMAGE" sh "$fix/parse_cookies_c.sh" --selfcheck
          run "$CLIENTS_IMAGE" python3 "$fix/parse_setcookie_clients.py" --selfcheck

      # The matrix test is #[ignore]d, so --ignored runs exactly it. The harness runs
      # each sidecar in its image with `--network=none`; a sidecar whose offline setup is
      # somehow missing degrades to SKIP rather than failing.
      - name: Generate the matrix
        run: cargo test -p keksbruch --features differential -- --ignored --nocapture

      # Render the matrix on the run's summary page, so a reviewer sees it on the
      # PR check without downloading the artifact.
      - name: Publish the matrix to the run summary
        if: always()
        run: |
          f=crates/keksbruch/COOKIE_MATRIX.md
          if [ -f "$f" ]; then cat "$f" >> "$GITHUB_STEP_SUMMARY"; fi

      - name: Upload matrix (Markdown + CSV + HTML + JSON)
        uses: actions/upload-artifact@v7
        with:
          name: keksbruch-matrix
          path: |
            crates/keksbruch/COOKIE_MATRIX.md
            crates/keksbruch/COOKIE_MATRIX.csv
            crates/keksbruch/COOKIE_MATRIX.html
            crates/keksbruch/COOKIE_MATRIX.json
          if-no-files-found: error

  # Publish the matrix's four files to GitHub Pages: the HTML report is the
  # well-readable view, with the .md, .csv, and .json beside it as downloads (the
  # report links to them by relative path). There is deliberately no index.html —
  # the files are served at their own URLs, entry point COOKIE_MATRIX.html. Runs
  # only on a push to main; never on pull_request (a fork cannot, and must not,
  # publish). One-time repo setup: Settings → Pages → Source = "GitHub Actions".
  deploy-pages:
    name: publish matrix to GitHub Pages
    needs: matrix
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      # The matrix job uploaded the four files under a common ancestor, so they
      # land flat in site/ (site/COOKIE_MATRIX.{md,csv,html,json}).
      - name: Download the matrix artifact
        uses: actions/download-artifact@v8
        with:
          name: keksbruch-matrix
          path: site
      # Serve the files verbatim — no Jekyll build, no index synthesis.
      - name: Mark the site as static
        run: touch site/.nojekyll
      - uses: actions/configure-pages@v6
      # A re-run of failed jobs keeps the earlier attempts' artifacts on the run, and
      # deploy-pages refuses to deploy when more than one artifact carries its name.
      # Scoping the name to the attempt keeps re-runs deployable.
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          name: github-pages-${{ github.run_attempt }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
