name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the jobs only read the repo. The sealed Docker pipeline needs
# no registry/push credentials.
permissions:
  contents: read

env:
  # The ONE place the gronke/rust-ci version is pinned. Each job checks the repo
  # out once at this ref, then uses its actions by local ./ path — GitHub does not
  # allow an expression in a step's `uses:`, so this is how the ref stays single-
  # sourced. Bump here only. Currently a main SHA (rust-ci is pre-v1); switch it to
  # a tag (e.g. v1) once rust-ci cuts one.
  RUST_CI_REF: 20d04cdfa016537dec1c8a68e520ac46052680f7
  # Incremental compilation is counter-productive in CI: it bloats the cache and
  # never pays off across the clean checkouts each run starts from. No debug symbols
  # either — nobody attaches a debugger to CI artifacts. Both are CARGO_* so the
  # sealed Docker actions forward them into the container build.
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  # Resilient crates.io downloads in the one networked step (cargo-fetch): more
  # retries and HTTP/1.1, which sidesteps the intermittent curl "[16] HTTP2 framing
  # layer" error. Forwarded into the container via CARGO_.*.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # The lint/test gate runs SEALED via gronke/rust-ci: every cargo invocation
  # executes inside a pinned rust image — non-root, --cap-drop=ALL,
  # --security-opt=no-new-privileges, repo mounted read-only, and --network=none
  # against a cache that the single networked `cargo-fetch` step warms first. A
  # dependency build.rs / proc-macro therefore compiles but cannot reach the network
  # — the same isolation the differential matrix already applies to its sidecars,
  # here extended to kekse's own build.
  ci:
    name: fmt, clippy, test (sealed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Check gronke/rust-ci out once at the pinned ref; the steps below use it by
      # local ./ path. It is a public repo, so the default token can read it.
      - name: Check out gronke/rust-ci
        uses: actions/checkout@v7
        with:
          repository: gronke/rust-ci
          ref: ${{ env.RUST_CI_REF }}
          path: .rust-ci

      # Restore the cargo download cache (.cargo-cache = the sealed CARGO_HOME) and
      # target/ across runs. rust-cache wraps the first-party actions/cache and
      # auto-saves at job end. The workspace has a single root lockfile, so key on it
      # (not the default **/Cargo.lock, which would also hash the .rust-ci checkout).
      - name: Cargo cache
        uses: ./.rust-ci/.github/actions/rust-cache
        with:
          prefix: ci
          cache-target: "true"
          cache-directories: .cargo-cache
          lockfiles: Cargo.lock

      # Build the pinned toolchain image (rust:latest + clippy/rustfmt/jq) and load
      # it locally. cache:false keeps this off actions/github-script@v7 (Node 20).
      - name: Build toolchain image
        uses: ./.rust-ci/.github/actions/build-image

      # The ONE networked step: populate .cargo-cache (cargo fetch --locked, the
      # whole Cargo.lock) so every sealed leg below runs --offline --network=none.
      - name: Cargo fetch
        uses: ./.rust-ci/.github/actions/cargo-fetch

      # fmt --check + clippy (--workspace --all-targets -D warnings) + test
      # (--workspace), --offline --locked, sealed. Once per feature universe.
      - name: Lint + test (default features)
        uses: ./.rust-ci/.github/actions/lint-and-test-docker

      # The all-features universe enables kekse's optional `tracing`/`axum` and
      # keksbruch's `differential` harness. The matrix test is #[ignore]d, so this
      # compiles the harness (clippy + test) without running it (no sidecars here).
      - name: Lint + test (all features)
        uses: ./.rust-ci/.github/actions/lint-and-test-docker
        with:
          features: --all-features

      # The crates are feature-light by default; prove they still build with no
      # features at all, so nothing silently leans on an optional one.
      - name: Build (no default features)
        uses: ./.rust-ci/.github/actions/cargo-docker
        with:
          args: build -p kekse -p keksbruch --no-default-features --locked

      # docs.rs builds with all features; mirror that with -D warnings so a broken
      # intra-doc link (the crate has many) fails CI, not the publish. RUSTDOCFLAGS
      # is not a CARGO_* var, so pass it via the action's literal `env` input.
      - name: Doc (all features)
        uses: ./.rust-ci/.github/actions/cargo-docker
        with:
          args: doc --workspace --no-deps --all-features --locked
          env: |
            RUSTDOCFLAGS=-D warnings

  # kekse pins MSRV 1.88.0 (workspace Cargo.toml) — the floor is the `time` crate
  # used for `Expires` dates. Build the core (default + all features) at exactly
  # that toolchain, SEALED: build-image resolves `msrv` from Cargo.toml's
  # rust-version, so the whole build runs on the support floor and a dependency
  # that raises its MSRV fails here. `--locked` pins the MSRV-verified dependency
  # versions. (keksbruch is a dev-only harness and is deliberately not built on
  # the MSRV leg.)
  msrv:
    name: build (MSRV 1.88.0, sealed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check out gronke/rust-ci
        uses: actions/checkout@v7
        with:
          repository: gronke/rust-ci
          ref: ${{ env.RUST_CI_REF }}
          path: .rust-ci

      # rust-version: msrv → reads `rust-version` (1.88.0) from the root Cargo.toml,
      # so the image IS the MSRV; the sealed builds below run on it.
      - name: Build MSRV toolchain image
        uses: ./.rust-ci/.github/actions/build-image
        with:
          rust-version: msrv

      - name: Cargo fetch
        uses: ./.rust-ci/.github/actions/cargo-fetch

      - name: Build core (default features)
        uses: ./.rust-ci/.github/actions/cargo-docker
        with:
          args: build -p kekse --locked

      - name: Build all features
        uses: ./.rust-ci/.github/actions/cargo-docker
        with:
          args: build -p kekse --all-features --locked

  # OPTIONAL advisory job: flags RustSec advisories in the dependency tree. It is
  # non-blocking (continue-on-error) and needs the network for the advisory DB, so
  # it runs on the host (not sealed). Delete this whole job to drop the check.
  audit:
    name: cargo audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
