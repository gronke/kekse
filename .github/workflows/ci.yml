name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the job only reads the repo and uses the cache service.
permissions:
  contents: read

env:
  # Incremental compilation is counter-productive in CI: it bloats the cache
  # and never pays off across the clean checkouts each run starts from.
  CARGO_INCREMENTAL: 0
  # No debug symbols in CI: nobody attaches a debugger to these artifacts.
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  ci:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Restore on every run (main and PRs). The save step below runs only on
      # main, so PRs consume a cache warmed by main read-only.
      - name: Restore cargo cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # rustfmt + clippy ship with the runner's stable toolchain; ensure they
      # are present and record versions for debuggable logs.
      - name: Toolchain
        run: |
          rustup component add rustfmt clippy
          rustc --version && cargo --version
          cargo fmt --version && cargo clippy --version

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      # The all-features universe enables kekse's optional `tracing` (gated
      # fail-soft logging) and keksbruch' `differential` harness. This is
      # the compile-only leg for the harness: clippy type-checks it against
      # cookie/biscotti, while `cargo test` skips the matrix itself (it is
      # `#[ignore]`d and needs python/node), so no extra toolchains are required.
      - name: clippy + test (all features)
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features

      # docs.rs builds with all features; mirror that here with -D warnings so a
      # broken intra-doc link (the crate has many) fails CI, not the publish.
      - name: doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

      # The crates are feature-light by default; prove they still build with no
      # features at all, so nothing silently leans on an optional one.
      - name: build (no default features)
        run: |
          cargo build -p kekse --no-default-features
          cargo build -p keksbruch --no-default-features

      # Warm the shared cache from main only. An unchanged Cargo.lock hits the
      # exact key and this save is a no-op.
      - name: Save cargo cache
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

  # kekse pins MSRV 1.88.0 (workspace Cargo.toml) — the floor is the `time` crate
  # used for `Expires` dates (time 0.3.x is edition 2024 / Rust 1.88). At 1.88
  # every feature builds, including the optional `axum` extractor (axum-core 0.5,
  # which needs 1.78). `--locked` pins the MSRV-verified dependency versions, so a
  # lock bump that raises the floor fails this leg rather than slipping through.
  # (keksbruch's differential deps need newer toolchains and are not built here.)
  msrv:
    name: build (MSRV 1.88.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.88.0
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Build core (default features)
        run: cargo +1.88.0 build -p kekse --locked
      - name: Build all features
        run: cargo +1.88.0 build -p kekse --all-features --locked

  # OPTIONAL advisory job: flags RustSec advisories in the dependency tree. It is
  # non-blocking (continue-on-error) and needs no config file — delete this whole
  # job to drop the supply-chain check.
  audit:
    name: cargo audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
